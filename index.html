<script>
    const map = L.map('map', { zoomControl: true, maxZoom: 18, minZoom: 7 }).setView([30.9500, -82.0000], 8);
    let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    map.zoomControl.setPosition('bottomright');

    const trainLayerGroup = L.layerGroup().addTo(map);
    let markerRegistry = {};

    // Updated: Live Data Fetching Logic
    window.activeServerData = [];

    async function loadLiveData() {
        try {
            const response = await fetch('trains.json?t=' + Date.now());
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            
            window.activeServerData = data; 
            processTrackerData(); 
        } catch (err) {
            console.error("Feed sync failed:", err);
        }
    }

    // Set refresh interval to 5 seconds
    setInterval(loadLiveData, 5000);
    loadLiveData();

    function toggleSidebar() {
        const workspace = document.getElementById('workspace');
        const toggleBtn = document.getElementById('sidebar-toggle');
        workspace.classList.toggle('sidebar-collapsed');
        toggleBtn.innerText = workspace.classList.contains('sidebar-collapsed') ? "▶" : "◀";
        setTimeout(() => { map.invalidateSize(); }, 260);
    }

    function getTrainColorClass(speed, crewType) {
        if (speed === 0) return "tag-stopped"; 
        if (crewType === "PLAYER") return "tag-moving-player"; 
        return "tag-moving-ai"; 
    }

    function updateGlobalHUD(filteredData) {
        let total = filteredData.length, moving = 0, stopped = 0, footage = 0, tonnage = 0;
        filteredData.forEach(train => {
            if (train.speed > 0) moving++; else stopped++;
            footage += train.length; tonnage += train.weight;
        });
        document.getElementById('hudTotal').innerText = total;
        document.getElementById('hudMoving').innerText = moving;
        document.getElementById('hudStopped').innerText = stopped;
        document.getElementById('hudFootage').innerText = footage.toLocaleString() + " FT";
        document.getElementById('hudTonnage').innerText = tonnage.toLocaleString() + " TNS";
    }

    function processTrackerData(searchQuery = "") {
        trainLayerGroup.clearLayers();
        markerRegistry = {};
        const accordionContainer = document.getElementById('accordionContainer');
        accordionContainer.innerHTML = '';

        const filteredTrains = window.activeServerData.filter(t => !searchQuery || t.symbol.toLowerCase().includes(searchQuery.toLowerCase()));
        updateGlobalHUD(filteredTrains);

        const groupedSubdivisions = {};
        filteredTrains.forEach(t => {
            if (!groupedSubdivisions[t.subdivision]) groupedSubdivisions[t.subdivision] = [];
            groupedSubdivisions[t.subdivision].push(t);
        });

        Object.keys(groupedSubdivisions).forEach(subName => {
            const trains = groupedSubdivisions[subName];
            const subGroup = document.createElement('div');
            subGroup.className = 'sub-group';

            const subHeader = document.createElement('div');
            subHeader.className = 'sub-header';
            subHeader.innerHTML = `<span>${subName}</span> <span class="train-count">${trains.length}</span>`;
            subGroup.appendChild(subHeader);

            const subContent = document.createElement('div');
            subContent.className = 'sub-content';

            trains.forEach(train => {
                const colorClass = getTrainColorClass(train.speed, train.type);
                const trainItem = document.createElement('div');
                trainItem.className = 'train-item';
                
                let speedColor = train.speed > 0 ? (train.type === "PLAYER" ? "#00FF00" : "#66CCFF") : "#FF3333";

                trainItem.innerHTML = `
                    <div><span class="train-symbol-txt">${train.symbol}</span><span class="train-crew-txt">[Loco: ${train.leadLoco}]</span></div>
                    <span style="color: ${speedColor}; font-weight: bold;">${train.speed === 0 ? 'STOP' : train.speed + ' MPH'}</span>
                `;
                
                trainItem.onclick = function() {
                    document.querySelectorAll('.train-item').forEach(el => el.classList.remove('active-selection'));
                    trainItem.classList.add('active-selection');
                    map.setView([train.lat, train.lng], 10, { animate: true });
                    if(markerRegistry[train.symbol]) {
                        markerRegistry[train.symbol].openPopup();
                    }
                };
                subContent.appendChild(trainItem);

                const labelHTML = `<div class="depot-tag ${colorClass}">${train.dir} ${train.symbol}</div>`;
                const depotIcon = L.divIcon({ html: labelHTML, className: 'clear-container', iconAnchor: [35, 10] });

                const infoCardHTML = `
                    <div class="popup-title">TELEMETRY DATA SHEET: ${train.symbol}</div>
                    <table class="popup-table">
                        <tr><td class="popup-lbl">SUBDIVISION</td><td>${train.subdivision}</td></tr>
                        <tr><td class="popup-lbl">CONTROL SYS</td><td>${train.type === 'PLAYER' ? 'MANNED' : 'AUTONOMOUS AI'}</td></tr>
                        <tr><td class="popup-lbl">LEAD LOCO #</td><td>${train.leadLoco}</td></tr>
                        <tr><td class="popup-lbl">OPERATOR ID</td><td>${train.crew}</td></tr>
                        <tr><td class="popup-lbl">SPEED</td><td>${train.speed} MPH</td></tr>
                        <tr><td class="popup-lbl">FEET</td><td>${train.length.toLocaleString()} FT</td></tr>
                        <tr><td class="popup-lbl">NET TONNAGE</td><td>${train.weight.toLocaleString()} TNS</td></tr>
                    </table>
                `;

                const marker = L.marker([train.lat, train.lng], { icon: depotIcon })
                    .addTo(trainLayerGroup)
                    .bindPopup(infoCardHTML, { className: 'depot-popup', closeButton: false, offset: [0, -5], autoPan: false });
                
                markerRegistry[train.symbol] = marker;
            });

            subGroup.appendChild(subContent);
            accordionContainer.appendChild(subGroup);
        });
    }

    function filterTrains() { processTrackerData(document.getElementById('trainSearch').value); }

    function toggleTheme() {
        const currentTheme = document.body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'light' ? 'MONO DARK MODE' : 'MONO LIGHT MODE';
        map.removeLayer(tileLayer);
        tileLayer = L.tileLayer(`https://{s}.basemaps.cartocdn.com/${newTheme === 'light' ? 'light_all' : 'dark_all'}/{z}/{x}/{y}{r}.png`).addTo(map);
        processTrackerData(document.getElementById('trainSearch').value); 
    }
</script>
