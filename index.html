<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run8 Dispatch Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #workspace { display: flex; width: 100vw; height: 100vh; transition: all 0.25s ease; }
        #sidebar { width: 320px; height: 100%; background: #111; color: #fff; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 1000; transition: margin-left 0.25s ease; }
        #map { flex-grow: 1; height: 100%; background: #1a1a1a; }
        .sidebar-collapsed #sidebar { margin-left: -320px; }
        #sidebar-toggle { position: absolute; left: 320px; top: 15px; z-index: 1001; background: #222; color: white; border: 1px solid #444; padding: 10px 12px; cursor: pointer; font-weight: bold; border-radius: 0 4px 4px 0; transition: left 0.25s ease; }
        .sidebar-collapsed #sidebar-toggle { left: 0; }
        .search-container { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .search-box { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .sub-group { margin-bottom: 15px; background: #1a1a1a; border-radius: 4px; overflow: hidden; border: 1px solid #222; }
        .sub-header { background: #222; padding: 10px 15px; font-weight: bold; font-size: 0.9em; letter-spacing: 1px; color: #aaa; border-bottom: 1px solid #333; }
        .train-card { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
        .train-card:hover { background: #252525; }
        .train-symbol { font-weight: bold; color: #fff; font-size: 1.1em; }
        .train-meta { font-size: 0.8em; color: #888; margin-top: 3px; }
        .train-badge { padding: 3px 6px; font-size: 0.75em; font-weight: bold; border-radius: 3px; }
        .badge-player { background: rgba(39, 174, 96, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .badge-ai { background: rgba(142, 68, 173, 0.2); color: #9b59b6; border: 1px solid #9b59b6; }
        .footer-container { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
        .theme-btn { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .theme-btn:hover { background: #444; }
        .depot-popup .leaflet-popup-content-wrapper { background: #111; color: #fff; border-radius: 4px; border: 1px solid #333; padding: 0; }
        .depot-popup .leaflet-popup-tip { background: #111; border: 1px solid #333; }
        .popup-tbl { width: 100%; font-family: monospace; border-collapse: collapse; }
        .popup-tbl td { padding: 4px 8px; border-bottom: 1px solid #222; }
        .popup-lbl { color: #888; font-weight: bold; width: 45%; }
    </style>
</head>
<body>

<div id="workspace">
    <button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
    
    <div id="sidebar">
        <div class="search-container">
            <input type="text" id="trainSearch" class="search-box" placeholder="Filter by symbol or sub..." oninput="filterTrains()">
        </div>
        <div class="list-container" id="accordion"></div>
        <div class="footer-container">
            <button id="themeBtn" class="theme-btn" onclick="toggleTheme()">MONO LIGHT MODE</button>
        </div>
    </div>

    <div id="map"></div>
</div>

    let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    map.zoomControl.setPosition('bottomright');

    let markerRegistry = {};
    window.activeServerData = [];

    // --- NEW: FUNCTION TO RENDER TRACK GEOMETRY ---
    function drawRailNetwork() {
        WaycrossSubCoords.forEach(segment => {
            L.polyline(segment, {
                color: '#2c3e50',   // Match your specific choice
                weight: 4,          // Track line width
                opacity: 0.85,
                interactive: true   // Allows the popup block below to process
            }).addTo(map).bindPopup(function() {
                return "<table width='248' class='routedata' align='left'><tr><td style='font-size:1.2em;line-height:14px;'><b>A-Line Route</b></td></tr><tr><td><b>Railroad:</b> CSX</td></tr></table>";
            }, {offset: [0, 0]});
        });
    }

    // Fire it up to lay the steel down immediately!
    drawRailNetwork();

    // Create Depot Custom Icon
    const depotIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color:#e74c3c; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6]
    });

    async function loadLiveData() {
        try {
            const response = await fetch('trains.json?t=' + Date.now());
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            
            window.activeServerData = data; 
            processTrackerData(); 
        } catch (err) {
            console.error("Feed sync failed:", err);
        }
    }

    setInterval(loadLiveData, 5000);
    loadLiveData();

    function toggleSidebar() {
        const workspace = document.getElementById('workspace');
        const toggleBtn = document.getElementById('sidebar-toggle');
        workspace.classList.toggle('sidebar-collapsed');
        toggleBtn.innerText = workspace.classList.contains('sidebar-collapsed') ? "▶" : "◀";
        setTimeout(() => { map.invalidateSize(); }, 260);
    }

    function getTrainColor(dir) {
        if(dir === "Northbound" || dir === "Eastbound") return "#2ecc71";
        if(dir === "Southbound" || dir === "Westbound") return "#3498db";
        return "#f1c40f";
    }

    function focusTrain(symbol) {
        const marker = markerRegistry[symbol];
        if (marker) {
            map.setView(marker.getLatLng(), 13);
            marker.openPopup();
        }
    }

    function processTrackerData(filterQuery = "") {
        trainLayerGroup.clearLayers();
        markerRegistry = {};
        
        const accordionContainer = document.getElementById('accordion');
        accordionContainer.innerHTML = '';

        const q = filterQuery.toLowerCase().trim();
        const grouped = {};

        window.activeServerData.forEach(train => {
            const symbolMatch = train.symbol.toLowerCase().includes(q);
            const subMatch = train.subdivision.toLowerCase().includes(q);
            
            if (q && !symbolMatch && !subMatch) return;

            if (!grouped[train.subdivision]) grouped[train.subdivision] = [];
            grouped[train.subdivision].push(train);
        });

        Object.keys(grouped).sort().forEach(subName => {
            const subGroup = document.createElement('div');
            subGroup.className = 'sub-group';
            
            const header = document.createElement('div');
            header.className = 'sub-header';
            header.innerText = subName.toUpperCase();
            subGroup.appendChild(header);

            const subContent = document.createElement('div');
            
            grouped[subName].forEach(train => {
                const card = document.createElement('div');
                card.className = 'train-card';
                card.onclick = () => focusTrain(train.symbol);
                
                card.innerHTML = `
                    <div>
                        <div class="train-symbol">${train.symbol}</div>
                        <div class="train-meta">${train.dir || 'UNK'} • Lead ${train.leadLoco}</div>
                    </div>
                    <span class="train-badge ${train.type === 'PLAYER' ? 'badge-player' : 'badge-ai'}">${train.type}</span>
                `;
                subContent.appendChild(card);

                const infoCardHTML = `
                    <div style="background:${getTrainColor(train.dir)}; height:4px; border-radius:4px 4px 0 0;"></div>
                    <table class="popup-tbl">
                        <tr><td class="popup-lbl">SYMBOL</td><td style="font-weight:bold; color:#fff;">${train.symbol}</td></tr>
                        <tr><td class="popup-lbl">LEAD UNIT</td><td>${train.leadLoco}</td></tr>
                        <tr><td class="popup-lbl">SUBDIVISION</td><td>${train.subdivision}</td></tr>
                        <tr><td class="popup-lbl">SPEED</td><td>${train.speed} MPH</td></tr>
                        <tr><td class="popup-lbl">FEET</td><td>${train.length.toLocaleString()} FT</td></tr>
                        <tr><td class="popup-lbl">NET TONNAGE</td><td>${train.weight.toLocaleString()} TNS</td></tr>
                    </table>
                `;

                const marker = L.marker([train.lat, train.lng], { icon: depotIcon })
                    .addTo(trainLayerGroup)
                    .bindPopup(infoCardHTML, { className: 'depot-popup', closeButton: false, offset: [0, -5], autoPan: false });
                
                markerRegistry[train.symbol] = marker;
            });

            subGroup.appendChild(subContent);
            accordionContainer.appendChild(subGroup);
        });
    }

    function filterTrains() { processTrackerData(document.getElementById('trainSearch').value); }

    function toggleTheme() {
        const currentTheme = document.body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'light' ? 'MONO DARK MODE' : 'MONO LIGHT MODE';
        map.removeLayer(tileLayer);
        tileLayer = L.tileLayer(`https://{s}.basemaps.cartocdn.com/${newTheme === 'light' ? 'light_all' : 'dark_all'}/{z}/{x}/{y}{r}.png`).addTo(map);
        processTrackerData(document.getElementById('trainSearch').value); 
    }
</script>

</body>
</html>
